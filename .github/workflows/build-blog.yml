# build-blog.yml — Generate feed.xml and blog/index.html from blog post meta tags.
name: Build blog

on:
  push:
    branches: ["main"]
    paths:
      - "blog/*.html"
      - "blog/_config.json"
      - "scripts/build_blog.py"
      - "!blog/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build feed and index
        run: python3 scripts/build_blog.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml blog/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate feed.xml and blog/index.html"
            git push
          fi
