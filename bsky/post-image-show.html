<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="ai-disclosure" content="ai-assisted">
<title>Bluesky Image Show</title>
<style>
  :root {
    --kb-duration: 11s;
    --fade-duration: 1800ms;
    --caption-fade: 600ms;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #e8e8ec;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { touch-action: pan-y; }

  /* Stage holds the slot pair and the parallax wrap */
  .stage {
    position: fixed; inset: 0;
    overflow: hidden;
    cursor: pointer;
  }
  .parallax {
    position: absolute; inset: 0;
    will-change: transform;
  }
  .slot {
    position: absolute; inset: -6%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000;
    opacity: 0;
    transform: scale(1.05) translate(0,0);
    transition: opacity var(--fade-duration) ease;
    will-change: opacity, transform;
  }
  .slot.active { opacity: 1; }
  .slot.ken-burns {
    transition: opacity var(--fade-duration) ease,
                transform var(--kb-duration) cubic-bezier(.33,0,.67,1);
  }

  /* Vignette + bottom gradient for caption legibility */
  .vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%),
      linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.85) 100%);
  }

  /* Top-right counter */
  .counter {
    position: fixed;
    top: max(18px, env(safe-area-inset-top));
    right: max(20px, env(safe-area-inset-right));
    z-index: 10;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    pointer-events: none;
    user-select: none;
    font-variant-numeric: tabular-nums;
  }

  /* Top-left title with seed link */
  /* (title removed — image show isn't about a single user, so no headline) */

  /* Inter-page nav icons (constellation / thread) */
  .nav-modes {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; gap: 6px;
    padding: 4px;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(10px) saturate(1.2);
    -webkit-backdrop-filter: blur(10px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    user-select: none;
  }
  .nav-modes a {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    transition: background 180ms, color 180ms, transform 180ms;
  }
  .nav-modes a:hover { background: rgba(255,255,255,0.12); color: #fff; transform: scale(1.08); }
  .nav-modes a.current { background: rgba(255,255,255,0.18); color: #fff; cursor: default; }
  .nav-modes a.current:hover { transform: none; }
  .nav-modes.hidden { display: none; }

  /* Caption — clickable, opens post */
  .caption {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: max(20px, env(safe-area-inset-left));
    right: max(20px, env(safe-area-inset-right));
    max-width: 720px;
    z-index: 10;
    color: #fff;
    text-decoration: none;
    display: block;
    padding: 14px 16px;
    border-radius: 10px;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(12px) saturate(1.2);
    -webkit-backdrop-filter: blur(12px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.08);
    transition: opacity var(--caption-fade) ease, transform var(--caption-fade) ease, background var(--caption-fade) ease;
    opacity: 0;
    transform: translateY(8px);
  }
  .caption.show { opacity: 1; transform: translateY(0); }
  .caption:hover { background: rgba(0,0,0,0.45); border-color: rgba(255,255,255,0.18); }
  .caption .meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 6px;
  }
  .caption .meta .handle { color: #fff; font-weight: 500; letter-spacing: 0.05em; text-transform: none; }
  .caption .meta .sep { opacity: 0.4; }
  .caption .meta .time { font-variant-numeric: tabular-nums; }
  .caption .meta .ext { margin-left: auto; opacity: 0.6; font-size: 12px; }
  .caption:hover .meta .ext { opacity: 1; }
  .caption .body {
    font-size: 14px;
    line-height: 1.45;
    color: rgba(255,255,255,0.92);
    max-height: 4.5em;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
    word-break: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
  }
  .caption .body:empty { display: none; }
  .avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background-size: cover; background-position: center;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Hint at bottom-right */
  .hint {
    position: fixed;
    bottom: max(28px, calc(env(safe-area-inset-bottom) + 8px));
    right: max(64px, calc(env(safe-area-inset-right) + 44px));
    z-index: 9;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.32);
    user-select: none;
    pointer-events: none;
    transition: opacity 200ms;
  }
  @media (max-width: 720px) { .hint { display: none; } }

  /* Chrome toggle — hides/shows all UI overlays for max image view */
  .chrome-toggle {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    right: max(20px, env(safe-area-inset-right));
    z-index: 13;
    width: 30px; height: 30px;
    border-radius: 999px;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(10px) saturate(1.2);
    -webkit-backdrop-filter: blur(10px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    opacity: 0.65;
    transition: background 200ms, color 200ms, transform 200ms, opacity 200ms;
  }
  .chrome-toggle:hover {
    background: rgba(255,255,255,0.14);
    color: #fff;
    opacity: 1;
    transform: scale(1.08);
  }

  /* When .hide-chrome is set on body, fade out all overlay UI except the toggle itself */
  body.hide-chrome .nav-modes,
  body.hide-chrome .counter,
  body.hide-chrome .caption,
  body.hide-chrome .hint,
  body.hide-chrome .paused-badge,
  body.hide-chrome .vignette {
    opacity: 0 !important;
    pointer-events: none;
  }
  body.hide-chrome .chrome-toggle { opacity: 0.25; }
  body.hide-chrome .chrome-toggle:hover { opacity: 1; }

  /* Pause indicator */
  .paused-badge {
    position: fixed;
    bottom: max(28px, calc(env(safe-area-inset-bottom) + 8px));
    right: max(20px, env(safe-area-inset-right));
    z-index: 11;
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms;
  }
  .paused-badge.show { opacity: 1; }
  /* Hide the hint while paused so the badge takes its slot */
  .paused-badge.show ~ .hint,
  body:has(.paused-badge.show) .hint { opacity: 0; }

  /* Loading state */
  .loading {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    gap: 24px;
    transition: opacity 600ms ease;
  }
  .loading.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .progress {
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.55);
    font-size: 10px;
  }

  /* Input form (no-url state) */
  .input-form {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000; gap: 18px; padding: 24px;
  }
  .input-form h1 {
    font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.85); font-weight: 400;
  }
  .input-form p {
    font-size: 11px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5); text-align: center; max-width: 480px; line-height: 1.6;
  }
  .input-form .row { display: flex; gap: 8px; width: 100%; max-width: 520px; }
  .input-form input {
    flex: 1; padding: 12px 14px;
    background: rgba(255,255,255,0.04); color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .input-form input:focus { border-color: rgba(255,255,255,0.4); }
  .input-form button {
    padding: 12px 20px; background: rgba(255,255,255,0.9); color: #000;
    border: none; border-radius: 6px; font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; font-weight: 500; cursor: pointer;
    font-family: inherit;
  }
  .input-form button:hover { background: #fff; }

  .error {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #000; color: #ff8888;
    font-size: 14px; letter-spacing: 0.05em;
    text-align: center; padding: 24px;
    flex-direction: column; gap: 12px;
  }
  .error a { color: rgba(255,255,255,0.8); }

  /* iOS orientation permission button */
  .tilt-prompt {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    background: rgba(255,255,255,0.92); color: #000;
    padding: 8px 14px; border-radius: 18px;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    font-weight: 500; cursor: pointer; border: none;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .tilt-prompt.hidden { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .slot.ken-burns { transition: opacity var(--fade-duration) ease; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="parallax" id="parallax">
      <div class="slot" data-slot="a"></div>
      <div class="slot" data-slot="b"></div>
    </div>
  </div>
  <div class="vignette"></div>

  <div class="nav-modes hidden" id="navModes">
    <a href="#" id="navConstellation" title="View as constellation graph" aria-label="Constellation graph">🌌</a>
    <a href="#" class="current" title="Image show (current)" aria-label="Image show (current)">🎞️</a>
    <a href="#" id="navThread" title="View as thread" aria-label="Thread reader">🧵</a>
  </div>
  <div class="counter" id="counter"></div>
  <a class="caption" id="caption" href="#" target="_blank" rel="noopener">
    <div class="meta">
      <div class="avatar" id="avatar"></div>
      <span class="handle" id="handle"></span>
      <span class="sep">·</span>
      <span class="time" id="time"></span>
      <span class="ext">↗</span>
    </div>
    <div class="body" id="body"></div>
  </a>
  <div class="hint">← → · space · click · h</div>
  <div class="paused-badge" id="paused">paused</div>
  <button class="chrome-toggle" id="chromeToggle" type="button" title="Hide UI (press h)" aria-label="Toggle UI">⛶</button>
  <button class="tilt-prompt hidden" id="tiltPrompt">Enable tilt</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Gathering posts</div>
    <div class="progress" id="progress">0 fetched · 0 calls</div>
  </div>

  <div class="input-form" id="inputForm" style="display:none">
    <h1>Bluesky Image Show</h1>
    <p>Paste any Bluesky source — a post, a profile, a feed, a list, or a search — and watch every image play as a slideshow.</p>
    <div class="row">
      <input id="urlInput" type="text" placeholder="Bluesky URL, @handle, #hashtag, or search" />
      <button id="goBtn">Go</button>
    </div>
  </div>

<script type="module">
// ── Imports from shared bsky-graph module ─────────────────────────────────
import {
  resolveToAtUri, fetchThreadDown, fetchThreadUp,
  fetchAllQuotePosts, fetchPost, getQuotedUri,
  postUrl, timeAgo
} from './bsky-graph.js';

// Public Bluesky AppView — feed / profile / list / search endpoints used directly.
const API = 'https://public.api.bsky.app/xrpc/';

// ── Image extraction ───────────────────────────────────────────────────────
function getImagesFromPost(post) {
  const e = post.embed;
  if (!e) return [];
  if (e.$type === 'app.bsky.embed.images#view') return e.images || [];
  if (e.$type === 'app.bsky.embed.recordWithMedia#view'
      && e.media?.$type === 'app.bsky.embed.images#view') return e.media.images || [];
  return [];
}

// ── Graph expansion ────────────────────────────────────────────────────────
// True BFS over the conversation graph. Three discovery axes are pursued in
// each iteration: (a) posts that quote each known post (downstream quotes),
// (b) replies hanging off each known post, and (c) the post each known post
// itself quotes (upstream quote-chain). Each axis is bounded; the loop runs
// until no new posts surface, the API budget is exhausted, or a hard
// iteration cap kicks in.
async function expandFully(seedUri, onProgress) {
  const allPosts = new Map();
  const exploredQuotes  = new Set(); // URIs whose downstream quotes were fetched
  const exploredReplies = new Set(); // URIs whose reply-tree was fetched
  const exploredQuoted  = new Set(); // post URIs whose quoted-target was checked

  const visit = (node) => {
    if (!node) return;
    if (node.post) allPosts.set(node.post.uri, node.post);
    if (Array.isArray(node.replies)) node.replies.forEach(visit);
    if (node.parent) visit(node.parent);
  };

  // Phase 0: seed thread (down + up). Walking through this counts as
  // "explored replies" for every node we see, since the API gave us their
  // reply trees in the same response.
  onProgress({ phase: 'thread', n: 0, calls: 0 });
  let calls = 2;
  const [down, up] = await Promise.all([
    fetchThreadDown(seedUri, 1000).catch(() => null),
    fetchThreadUp(seedUri).catch(() => null),
  ]);
  visit(down); visit(up);
  for (const u of allPosts.keys()) exploredReplies.add(u);

  // Tunables — can be raised if the graph is huge. Public API is generous
  // but not infinite; these caps keep the initial load under ~30s.
  const MAX_CALLS        = 600;
  const MAX_ITERATIONS   = 25;
  const QUOTES_BATCH     = 8;   // parallel fetchAllQuotePosts per iteration
  const REPLIES_BATCH    = 8;   // parallel fetchThreadDown per iteration
  const QUOTED_BATCH     = 12;  // parallel fetchPost per iteration

  for (let iter = 0; iter < MAX_ITERATIONS; iter++) {
    const before = allPosts.size;
    if (calls >= MAX_CALLS) break;

    // (a) Downstream quotes — fetch quotes of each unexplored URI.
    const qNeed = [...allPosts.keys()].filter(u => !exploredQuotes.has(u));
    if (qNeed.length && calls < MAX_CALLS) {
      const batch = qNeed.slice(0, QUOTES_BATCH);
      for (const u of batch) exploredQuotes.add(u);
      onProgress({ phase: 'quotes', n: allPosts.size, calls });
      const results = await Promise.allSettled(batch.map(u => fetchAllQuotePosts(u)));
      calls += batch.length;
      for (const r of results) {
        if (r.status === 'fulfilled') {
          for (const p of r.value) {
            if (!allPosts.has(p.uri)) allPosts.set(p.uri, p);
          }
        }
      }
    }

    // (b) Reply branches — fetch thread-down for unexplored URIs.
    const rNeed = [...allPosts.keys()].filter(u => !exploredReplies.has(u));
    if (rNeed.length && calls < MAX_CALLS) {
      const batch = rNeed.slice(0, REPLIES_BATCH);
      for (const u of batch) exploredReplies.add(u);
      onProgress({ phase: 'replies', n: allPosts.size, calls });
      const results = await Promise.allSettled(batch.map(u => fetchThreadDown(u, 3).catch(() => null)));
      calls += batch.length;
      for (const r of results) {
        if (r.status === 'fulfilled' && r.value) visit(r.value);
      }
    }

    // (c) Upstream quote-chain — for each post that quotes something, fetch
    // the quoted post if we don't have it. Catches A → B → C chains where
    // only A was reached via downstream traversal.
    const cCandidates = [...allPosts.values()].filter(p => !exploredQuoted.has(p.uri));
    const cBatch = cCandidates.slice(0, QUOTED_BATCH);
    for (const p of cBatch) exploredQuoted.add(p.uri);
    const cTargets = cBatch
      .map(p => getQuotedUri(p))
      .filter(uri => uri && !allPosts.has(uri));
    if (cTargets.length && calls < MAX_CALLS) {
      onProgress({ phase: 'quoted', n: allPosts.size, calls });
      const results = await Promise.allSettled(cTargets.map(u => fetchPost(u).catch(() => null)));
      calls += cTargets.length;
      for (const r of results) {
        if (r.status === 'fulfilled' && r.value) {
          allPosts.set(r.value.uri, r.value);
        }
      }
    }

    // Convergence: nothing new this round and nothing left to explore.
    if (allPosts.size === before
        && qNeed.length === 0 && rNeed.length === 0 && cTargets.length === 0) {
      break;
    }
  }

  onProgress({ phase: 'done', n: allPosts.size, calls });
  return [...allPosts.values()];
}

// ── Source classification ──────────────────────────────────────────────────
// The image show accepts any Bluesky collection, not just a post thread.
// classifySource maps a raw URL / handle / query to one of five source kinds:
//   thread  → a post and its expanded conversation graph (the original mode)
//   profile → a user's posts (media-only author feed)
//   feed    → a custom feed generator
//   list    → a curated list's post feed
//   search  → a search query or hashtag
async function resolveHandle(handle) {
  handle = handle.trim().replace(/^@/, '');
  if (handle.startsWith('did:')) return handle;
  const r = await fetch(API + 'com.atproto.identity.resolveHandle?handle=' + encodeURIComponent(handle));
  if (!r.ok) throw new Error('Could not resolve handle: ' + handle);
  return (await r.json()).did;
}

async function classifySource(raw) {
  raw = (raw || '').trim();
  if (!raw) throw new Error('Enter a Bluesky URL, handle, or search');

  if (raw.startsWith('at://')) {
    if (raw.includes('/app.bsky.feed.post/'))      return { kind: 'thread', seed: raw };
    if (raw.includes('/app.bsky.feed.generator/')) return { kind: 'feed',   uri: raw };
    if (raw.includes('/app.bsky.graph.list/'))     return { kind: 'list',   uri: raw };
    throw new Error('Unsupported at:// collection');
  }

  const m = raw.match(/bsky\.app\/(.+)$/);
  if (m) {
    const path = m[1];
    let g;
    if (path.match(/^profile\/[^/]+\/post\/[^/?#]+/))
      return { kind: 'thread', seed: raw };
    if (g = path.match(/^profile\/([^/]+)\/feed\/([^/?#]+)/))
      return { kind: 'feed', uri: `at://${await resolveHandle(g[1])}/app.bsky.feed.generator/${g[2]}` };
    if (g = path.match(/^profile\/([^/]+)\/lists\/([^/?#]+)/))
      return { kind: 'list', uri: `at://${await resolveHandle(g[1])}/app.bsky.graph.list/${g[2]}` };
    if (g = path.match(/^search\?.*\bq=([^&]+)/))
      return { kind: 'search', query: decodeURIComponent(g[1].replace(/\+/g, ' ')) };
    if (g = path.match(/^hashtag\/([^/?#]+)/))
      return { kind: 'search', query: '#' + decodeURIComponent(g[1]) };
    if (g = path.match(/^profile\/([^/?#]+)\/?$/))
      return { kind: 'profile', actor: decodeURIComponent(g[1]) };
    throw new Error('Unrecognized bsky.app URL');
  }

  if (/^#\S+$/.test(raw))           return { kind: 'search', query: raw };
  if (/^did:[a-z]+:.+/i.test(raw))  return { kind: 'profile', actor: raw };
  if (/^@?[\w.-]+\.\w+$/.test(raw)) return { kind: 'profile', actor: raw.replace(/^@/, '') };
  return { kind: 'search', query: raw };  // free text → search
}

// ── Post streams ────────────────────────────────────────────────────────────
// A stream exposes async next() → { posts, done }. Feed-style sources fetch one
// paginated API page per call so images load lazily as the show advances; the
// thread source runs the whole graph walk once and returns done.
const STREAM_LABEL = {
  thread: 'conversation graph', profile: 'profile posts',
  feed: 'feed', list: 'list', search: 'search results',
};

function makeFeedStream({ endpoint, params, itemsKey }) {
  let cursor = null, page = 0, exhausted = false;
  return async function next() {
    if (exhausted) return { posts: [], done: true };
    const qs = new URLSearchParams({ ...params, limit: '100' });
    if (cursor) qs.set('cursor', cursor);
    const r = await fetch(API + endpoint + '?' + qs);
    if (!r.ok) throw new Error(`Fetch failed (${r.status}) — the source may be private or unavailable`);
    const data = await r.json();
    // getFeed/getAuthorFeed/getListFeed wrap posts in feedViewPost; searchPosts is flat.
    const posts = (data[itemsKey] || []).map(it => it.post || it).filter(Boolean);
    cursor = data.cursor || null;
    if (++page >= MAX_PAGES || !cursor || posts.length === 0) exhausted = true;
    return { posts, done: exhausted };
  };
}

function makeStream(source) {
  if (source.kind === 'thread') {
    let done = false;
    return {
      shuffle: true,           // a conversation graph has no natural order
      crossNav: source.seed,   // post URL — enables the constellation/thread nav
      async next(onProgress) {
        if (done) return { posts: [], done: true };
        done = true;
        const atUri = await resolveToAtUri(source.seed);
        const posts = await expandFully(atUri, onProgress || (() => {}));
        return { posts, done: true };
      },
    };
  }
  const cfg = {
    profile: { endpoint: 'app.bsky.feed.getAuthorFeed', params: { actor: source.actor, filter: 'posts_with_media' }, itemsKey: 'feed' },
    feed:    { endpoint: 'app.bsky.feed.getFeed',       params: { feed: source.uri }, itemsKey: 'feed' },
    list:    { endpoint: 'app.bsky.feed.getListFeed',   params: { list: source.uri }, itemsKey: 'feed' },
    search:  { endpoint: 'app.bsky.feed.searchPosts',   params: { q: source.query }, itemsKey: 'posts' },
  }[source.kind];
  if (!cfg) throw new Error('Unsupported source: ' + source.kind);
  return { shuffle: false, crossNav: null, next: makeFeedStream(cfg) };
}

// ── Aspect-aware sizing ────────────────────────────────────────────────────
// When image and viewport aspect ratios differ by more than ~1.5×,
// fall back to 'contain' (with a black letterbox/pillarbox) so portrait
// images on landscape screens (or vice versa) aren't aggressively cropped.
function chooseFit(image) {
  const ar = image?.aspectRatio;
  if (!ar || !ar.width || !ar.height) return 'cover';
  const imgAspect = ar.width / ar.height;
  const viewAspect = window.innerWidth / window.innerHeight;
  const ratio = Math.max(imgAspect / viewAspect, viewAspect / imgAspect);
  return ratio > 1.5 ? 'contain' : 'cover';
}

// ── App state ──────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const parallaxEl = document.getElementById('parallax');
const slotA = document.querySelector('[data-slot="a"]');
const slotB = document.querySelector('[data-slot="b"]');
const captionEl = document.getElementById('caption');
const handleEl = document.getElementById('handle');
const timeEl = document.getElementById('time');
const bodyEl = document.getElementById('body');
const avatarEl = document.getElementById('avatar');
const counterEl = document.getElementById('counter');
const pausedEl = document.getElementById('paused');
const tiltBtn = document.getElementById('tiltPrompt');
const loadingEl = document.getElementById('loading');
const progressEl = document.getElementById('progress');
const inputForm = document.getElementById('inputForm');

let slides = [];
let index = 0;
let activeSlot = 'b';
let advanceTimer = null;
let paused = false;
let hoveringCaption = false;
const SLIDE_DURATION = 7500; // ms
let preloadCache = new Map();

// ── Lazy-loading stream state ──────────────────────────────────────────────
const INITIAL_IMAGES = 5;   // images to gather before the show starts
const PRELOAD_AHEAD  = 5;   // images to preload ahead of the current slide
const REFILL_AHEAD   = 12;  // refill the stream when within this many of the end
const MAX_PAGES      = 40;  // hard cap on paginated fetches per source

let stream = null;          // active post stream (see makeStream)
let streamDone = false;     // true once the source is fully consumed
let fetching = false;       // guards against overlapping refills
const seenImages = new Set(); // dedupe by image URL across pages

// ── Slide rendering with Ken Burns ─────────────────────────────────────────
function randTransform(intensity = 1) {
  const scale = 1.05 + Math.random() * 0.13 * intensity;
  const tx = (Math.random() - 0.5) * 90 * intensity;
  const ty = (Math.random() - 0.5) * 90 * intensity;
  return { scale, tx, ty, str: `scale(${scale.toFixed(3)}) translate(${tx.toFixed(1)}px, ${ty.toFixed(1)}px)` };
}

function preloadImage(url) {
  if (preloadCache.has(url)) return preloadCache.get(url);
  const p = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = url;
  });
  preloadCache.set(url, p);
  return p;
}

async function showSlide(slide, { skipPreload = false } = {}) {
  if (!slide) return;
  if (!skipPreload) await preloadImage(slide.image.fullsize);

  const next = activeSlot === 'a' ? 'b' : 'a';
  const showEl = next === 'a' ? slotA : slotB;
  const hideEl = next === 'a' ? slotB : slotA;

  const start = randTransform(0.7);
  const end = randTransform(1.0);

  // Stage with start transform, no transition
  showEl.classList.remove('ken-burns');
  showEl.style.backgroundImage = `url("${slide.image.fullsize}")`;
  showEl.style.backgroundSize = chooseFit(slide.image);
  showEl.style.transform = start.str;
  void showEl.offsetWidth;

  // Enable transitions, fade in, animate transform to end
  showEl.classList.add('ken-burns');
  showEl.classList.add('active');
  hideEl.classList.remove('active');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    showEl.style.transform = end.str;
  }));

  activeSlot = next;
  setCaption(slide);
  updateCounter();

  // Preload a window of upcoming images (and the one behind), so navigation
  // stays instant even while later pages are still streaming in.
  for (let k = 1; k <= PRELOAD_AHEAD; k++) {
    const s = slides[(index + k) % slides.length];
    if (s) preloadImage(s.image.fullsize);
  }
  const back = slides[(index - 1 + slides.length) % slides.length];
  if (back) preloadImage(back.image.fullsize);
}

function setCaption(slide) {
  const p = slide.post;
  const url = postUrl(p);
  captionEl.href = url;

  const handle = '@' + (p.author.handle || 'unknown');
  const display = p.author.displayName ? p.author.displayName : handle;
  handleEl.textContent = display;
  handleEl.title = handle;
  timeEl.textContent = timeAgo(p.indexedAt || p.record?.createdAt);

  const text = (p.record?.text || '').trim();
  // Use alt text if post has no text body
  bodyEl.textContent = text || (slide.image.alt ? slide.image.alt : '');

  if (p.author.avatar) {
    avatarEl.style.backgroundImage = `url("${p.author.avatar}")`;
  } else {
    avatarEl.style.backgroundImage = '';
    avatarEl.style.background = '#444';
  }

  captionEl.classList.remove('show');
  void captionEl.offsetWidth;
  captionEl.classList.add('show');
}

function updateCounter() {
  // Trailing "+" while the source is still streaming — total isn't final yet.
  counterEl.textContent = `${index + 1} / ${slides.length}${streamDone ? '' : '+'}`;
}

// ── Navigation ────────────────────────────────────────────────────────────
function goTo(newIndex) {
  if (slides.length === 0) return;
  index = ((newIndex % slides.length) + slides.length) % slides.length;
  showSlide(slides[index]);
  resetTimer();
  // Pull more posts when the viewer nears the end of what's loaded.
  if (!streamDone && slides.length - index <= REFILL_AHEAD) ensureBuffer();
}
function next() { goTo(index + 1); }
function prev() { goTo(index - 1); }

function resetTimer() {
  if (advanceTimer) clearTimeout(advanceTimer);
  if (paused || hoveringCaption) return;
  advanceTimer = setTimeout(() => next(), SLIDE_DURATION);
}

function togglePause() {
  paused = !paused;
  pausedEl.classList.toggle('show', paused);
  if (paused) {
    if (advanceTimer) clearTimeout(advanceTimer);
  } else {
    resetTimer();
  }
}

// ── Input handling ────────────────────────────────────────────────────────
// Click on stage (not caption, not chrome toggle): pause/play toggle
stage.addEventListener('click', (e) => {
  if (e.target.closest('.caption')) return;
  if (e.target.closest('.chrome-toggle')) return;
  togglePause();
});

// Chrome toggle — hides/shows all overlay UI for max image view
const chromeToggle = document.getElementById('chromeToggle');
function toggleChrome() {
  const hidden = document.body.classList.toggle('hide-chrome');
  chromeToggle.setAttribute('title', hidden ? 'Show UI (press h)' : 'Hide UI (press h)');
  chromeToggle.setAttribute('aria-label', hidden ? 'Show UI' : 'Hide UI');
}
chromeToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleChrome();
});

// Pause auto-advance while reading the caption
captionEl.addEventListener('mouseenter', () => {
  hoveringCaption = true;
  if (advanceTimer) clearTimeout(advanceTimer);
});
captionEl.addEventListener('mouseleave', () => {
  hoveringCaption = false;
  resetTimer();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === ' ') { e.preventDefault(); togglePause(); }
  else if (e.key === 'h' || e.key === 'H') { e.preventDefault(); toggleChrome(); }
});

// Touch swipe
let touchStartX = null, touchStartY = null, touchStartT = 0;
stage.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartT = Date.now();
}, { passive: true });
stage.addEventListener('touchend', (e) => {
  if (touchStartX == null) return;
  const dx = (e.changedTouches[0].clientX - touchStartX);
  const dy = (e.changedTouches[0].clientY - touchStartY);
  const dt = Date.now() - touchStartT;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 600) {
    if (dx < 0) next(); else prev();
  }
  touchStartX = touchStartY = null;
}, { passive: true });

// ── Parallax: mouse on desktop, accelerometer on mobile ────────────────────
const PARALLAX_MAX = 28; // px
let mouseX = 0.5, mouseY = 0.5;
let tiltX = 0, tiltY = 0; // -1..1
let parallaxX = 0, parallaxY = 0;
let usingOrientation = false;

window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX / window.innerWidth;
  mouseY = e.clientY / window.innerHeight;
});

let orientCalibrated = false;
let orientBeta0 = 0, orientGamma0 = 0;
function onOrient(e) {
  const g = (e.gamma || 0); const b = (e.beta || 0);
  if (!orientCalibrated) {
    // First reading sets the neutral position — whatever way the user is holding the phone
    orientBeta0 = b;
    orientGamma0 = g;
    orientCalibrated = true;
  }
  const dg = g - orientGamma0;
  const db = b - orientBeta0;
  // Map a comfortable ±20° range to ±1
  tiltX = Math.max(-1, Math.min(1, dg / 20));
  tiltY = Math.max(-1, Math.min(1, db / 20));
  usingOrientation = true;
}

async function enableOrientation() {
  if (!window.DeviceOrientationEvent) return false;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r !== 'granted') return false;
    } catch { return false; }
  }
  window.addEventListener('deviceorientation', onOrient);
  return true;
}

// On touch devices: try to set up orientation, prompting for permission on iOS
function setupTilt() {
  const isTouch = matchMedia('(pointer: coarse)').matches;
  if (!isTouch || !window.DeviceOrientationEvent) return;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — needs explicit user gesture
    tiltBtn.classList.remove('hidden');
    tiltBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const ok = await enableOrientation();
      if (ok) tiltBtn.classList.add('hidden');
    });
  } else {
    enableOrientation();
  }
}

function tick() {
  let tx, ty;
  if (usingOrientation) {
    tx = tiltX;
    ty = tiltY;
  } else {
    tx = (mouseX - 0.5) * 2;
    ty = (mouseY - 0.5) * 2;
  }
  const targetX = -tx * PARALLAX_MAX;
  const targetY = -ty * PARALLAX_MAX;
  parallaxX += (targetX - parallaxX) * 0.06;
  parallaxY += (targetY - parallaxY) * 0.06;
  parallaxEl.style.transform = `translate3d(${parallaxX.toFixed(1)}px, ${parallaxY.toFixed(1)}px, 0)`;
  requestAnimationFrame(tick);
}

// ── Boot ──────────────────────────────────────────────────────────────────
function showError(msg) {
  loadingEl.classList.add('hide');
  const div = document.createElement('div');
  div.className = 'error';
  div.innerHTML = `<div>${msg}</div><div style="font-size:11px;opacity:0.6;letter-spacing:0.15em;text-transform:uppercase">add ?url=&lt;bsky url&gt; to retry</div>`;
  document.body.appendChild(div);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Lazy stream consumption ─────────────────────────────────────────────────
// pullPage fetches one page from the active stream and appends a slide for
// every new image; ensureBuffer keeps a comfortable margin loaded ahead of the
// current slide so navigation stays instant while later pages stream in.
async function pullPage(onProgress) {
  if (streamDone || !stream) return 0;
  const { posts, done } = await stream.next(onProgress);
  if (done) streamDone = true;
  let added = 0;
  for (const post of posts) {
    for (const img of getImagesFromPost(post)) {
      if (img.fullsize && !seenImages.has(img.fullsize)) {
        seenImages.add(img.fullsize);
        slides.push({ post, image: img });
        added++;
      }
    }
  }
  if (slides.length) updateCounter();
  return added;
}

async function ensureBuffer() {
  if (fetching || streamDone) return;
  fetching = true;
  try {
    while (!streamDone && slides.length - index < REFILL_AHEAD * 3) {
      await pullPage();
    }
  } catch (err) {
    console.error('stream refill failed:', err);
    streamDone = true;  // stop trying; the viewer keeps whatever loaded
    updateCounter();
  } finally {
    fetching = false;
  }
}

async function boot(seedUrl) {
  try {
    progressEl.textContent = 'classifying source…';
    const source = await classifySource(seedUrl);
    stream = makeStream(source);
    const label = STREAM_LABEL[source.kind] || 'posts';

    // Cross-mode nav (constellation / thread) only applies to a post thread.
    if (stream.crossNav) {
      const enc = encodeURIComponent(stream.crossNav);
      document.getElementById('navConstellation').href = `post-constellation-graph?url=${enc}`;
      document.getElementById('navThread').href = `thread-reader?url=${enc}`;
      document.getElementById('navModes').classList.remove('hidden');
    }

    // Initial fill — gather a first batch of images before starting the show.
    progressEl.textContent = `reading ${label}…`;
    while (slides.length < INITIAL_IMAGES && !streamDone) {
      await pullPage((status) => {
        const n = status?.n || 0, c = status?.calls || 0;
        if (status?.phase === 'thread')       progressEl.textContent = 'fetching thread…';
        else if (status?.phase === 'quotes')  progressEl.textContent = `${n} posts · ${c} calls · expanding quotes`;
        else if (status?.phase === 'replies') progressEl.textContent = `${n} posts · ${c} calls · finding reply branches`;
        else if (status?.phase === 'quoted')  progressEl.textContent = `${n} posts · ${c} calls · walking quote chains`;
      });
      if (slides.length) progressEl.textContent = `${slides.length} images · ${label}`;
    }

    if (slides.length === 0) {
      showError(`No images found in this ${label}.`);
      return;
    }

    // A conversation graph has no natural order, so shuffle it; feed-style
    // sources keep their original (chronological / relevance) order.
    if (stream.shuffle) shuffle(slides);
    index = 0;

    // Hide loading and start
    setupTilt();
    loadingEl.classList.add('hide');
    setTimeout(() => { loadingEl.style.display = 'none'; }, 700);

    await showSlide(slides[0]);
    resetTimer();
    tick();

    ensureBuffer();  // keep loading the rest of the source in the background

  } catch (err) {
    console.error(err);
    showError(err.message || 'Something went wrong');
  }
}

// Entry
const params = new URLSearchParams(location.search);
const seedUrl = params.get('url');

if (seedUrl) {
  boot(seedUrl);
} else {
  loadingEl.style.display = 'none';
  inputForm.style.display = 'flex';
  document.getElementById('goBtn').addEventListener('click', () => {
    const v = document.getElementById('urlInput').value.trim();
    if (v) location.search = '?url=' + encodeURIComponent(v);
  });
  document.getElementById('urlInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('goBtn').click();
  });
}
</script>
