<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- === REQUIRED: blog automation reads these meta tags === -->
    <title>Post Title Here</title>
    <meta name="description" content="A short summary for search engines and the blog index.">
    <meta name="article:published_time" content="2026-01-01T00:00:00Z">

    <!-- === OPTIONAL: defaults applied if omitted === -->
    <!-- author defaults to site owner (Oskar Austegard / Muninn per site) -->
    <meta name="article:author" content="Oskar Austegard">
    <!-- summary defaults to description; use when you want index text to differ from og:description -->
    <meta name="article:summary" content="Summary shown on the blog index page.">

    <!-- === OPEN GRAPH (for link previews) === -->
    <meta property="og:title" content="Post Title Here">
    <meta property="og:description" content="A short summary for search engines and the blog index.">
    <meta property="og:type" content="article">
    <!-- og:image is optional; omit if no hero image -->
    <meta property="og:image" content="/images/blog/my-post/hero.png">

    <!-- === BLUESKY ENGAGEMENT (added after posting to Bluesky) === -->
    <!-- The bsky auto-wire script reads this and sets data-bsky-uri on #bsky-engagement -->
    <meta name="bsky:uri" content="at://did:plc:.../app.bsky.feed.post/...">

    <!-- === STANDARD ASSETS === -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/blog.css">
    <link rel="alternate" type="application/atom+xml" title="Feed" href="/feed.xml">

    <!-- Post-specific styles (only if needed — keep minimal) -->
    <!--
    <style>
        .comparison-table td:first-child { text-align: left; }
    </style>
    -->
</head>
<body>
    <a href="/blog/" class="back-link">Blog</a>
    <article>

<h1>Post Title Here</h1>
<p class="post-meta">Written by Author &middot; Month Day, Year</p>

<!-- Post content goes here -->
<p>First paragraph...</p>

    </article>

    <!-- Bluesky engagement widget -->
    <!-- Auto-wired: the inline script copies bsky:uri meta → data-bsky-uri attribute -->
    <!-- Then bsky-engagement.js picks it up normally via [data-bsky-uri] selector -->
    <div class="bsky-section">
        <div id="bsky-engagement"
             data-bsky-sort="likes"
             data-bsky-theme="auto">
        </div>
        <noscript>
            <p><a href="https://bsky.app/profile/austegard.com">Discuss on Bluesky</a></p>
        </noscript>
    </div>
    <script>
    (function() {
        var m = document.querySelector('meta[name="bsky\\:uri"]');
        if (m && m.content && !m.content.includes('...'))
            document.getElementById('bsky-engagement').setAttribute('data-bsky-uri', m.content);
    })();
    </script>
    <script type="module" src="/bsky/bsky-engagement.js"></script>
</body>
</html>
